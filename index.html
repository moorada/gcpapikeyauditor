<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>GCP API Key Auditor — Test &amp; Audit Google Cloud API Keys</title>
    <meta name="description" content="Free online tool to test and audit Google Cloud (GCP) API keys. Checks 40+ APIs including Maps, Vision, Gemini, and Firebase for accessibility, key restrictions, and security exposure. Runs entirely via Cloudflare Worker — your key is never stored." />
    <meta name="keywords" content="GCP API key audit, Google Cloud API key test, API key security, GCP API key checker, Google Maps API key test, API key vulnerability, GCP security tool" />
    <meta name="author" content="gcpapikeyauditor.alongale.com" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://gcpapikeyauditor.alongale.com/" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gcpapikeyauditor.alongale.com/" />
    <meta property="og:title" content="GCP API Key Auditor — Test &amp; Audit Google Cloud API Keys" />
    <meta property="og:description" content="Free online tool to test and audit GCP API keys against 40+ Google APIs. Detects accessible endpoints, key restrictions, and security exposure. Browser-based, no data stored." />
    <meta property="og:image" content="https://gcpapikeyauditor.alongale.com/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="GCP API Key Auditor — Test and audit Google Cloud API keys" />
    <meta property="og:site_name" content="GCP API Key Auditor" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://gcpapikeyauditor.alongale.com/" />
    <meta name="twitter:title" content="GCP API Key Auditor — Test &amp; Audit Google Cloud API Keys" />
    <meta name="twitter:description" content="Free online tool to test and audit GCP API keys against 40+ Google APIs. Detects accessible endpoints, key restrictions, and security exposure." />
    <meta name="twitter:image" content="https://gcpapikeyauditor.alongale.com/og-image.svg" />
    <meta name="twitter:image:alt" content="GCP API Key Auditor" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#0d1421" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="GCP API Key Auditor" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "GCP API Key Auditor",
      "url": "https://gcpapikeyauditor.alongale.com/",
      "description": "Free online tool to test and audit Google Cloud (GCP) API keys. Checks 40+ APIs including Maps, Vision, Gemini, and Firebase for accessibility, key restrictions, and security exposure.",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern browser with JavaScript enabled",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Tests 40+ Google Cloud APIs",
        "Detects accessible endpoints",
        "Identifies key restrictions",
        "Checks service enablement",
        "Browser-based — no data stored",
        "Cloudflare Worker proxy"
      ],
      "keywords": "GCP API key audit, Google Cloud security, API key test, Maps API key checker"
    }
    </script>
  </head>
  <body>
    <main class="app">
      <section class="hero" aria-labelledby="title">
        <h1 id="title">GCP API Key Auditor</h1>
        <p class="subtitle">Probes are routed through a Cloudflare Worker — your API key is never stored or forwarded to any third party.</p>

        <form id="audit-form" class="audit-form" autocomplete="off">
          <label for="api-key" class="visually-hidden">Google Cloud API key</label>
          <input
            id="api-key"
            name="api-key"
            type="password"
            placeholder="Paste GCP API key (AIza...)"
            spellcheck="false"
            required
          />
          <button id="analyze-btn" type="submit">Run Audit</button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section id="results" class="results hidden" aria-live="polite">
        <div class="summary" id="summary"></div>
        <div class="result-section">
          <h2>API Probe Results</h2>
          <ul id="api-results" class="api-list"></ul>
        </div>
        <div class="result-section">
          <h2>Issues &amp; Impacts</h2>
          <ul id="issues" class="issues-list"></ul>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
